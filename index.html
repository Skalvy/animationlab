<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animation Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Animation<span>Lab</span></h1>
        <p>Interactive CSS Motion Library</p>
    </header>

    <div class="grid">
        <div class="box">
            <label>Color Transition</label>
            <button class="c-btn">Action</button>
        </div>

        <div class="box">
            <label>Scale Effect</label>
            <div class="s-card">Hover Me</div>
        </div>

        <div class="box">
            <label>Hidden Reveal</label>
            <div class="f-box">
                <p class="f-text">Neon Active</p>
            </div>
        </div>

        <div class="box">
            <label>Linear Motion</label>
            <div class="m-square"></div>
        </div>

        <div class="box">
            <label>Pulse Glow</label>
            <button class="p-btn">Live</button>
        </div>

        <div class="box">
            <label>Inifinite Spin</label>
            <div class="spin"></div>
        </div>

        <div class="box">
            <label>Staggered Entrance</label>
            <div class="list">
                <div class="item"></div>
                <div class="item"></div>
                <div class="item"></div>
            </div>
        </div>

        <div class="box">
            <label>Animated Underline</label>
            <nav class="nav">
                <a href="#">Explore</a>
            </nav>
        </div>

        <div class="box">
            <label>Material Ripple</label>
            <button class="r-btn">Press</button>
        </div>

        <div class="box">
            <label>Morphing Icon</label>
            <input type="checkbox" id="b-check" class="b-in">
            <label for="b-check" class="b-lab">
                <div class="l"></div>
                <div class="l"></div>
                <div class="l"></div>
            </label>
        </div>

        <div class="box wide">
            <label>Image Zoom & Overlay</label>
            <div class="i-wrap">
                <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=500" alt="Tech">
                <div class="over">DETAILS</div>
            </div>
        </div>
    </div>
</body>
</html>
